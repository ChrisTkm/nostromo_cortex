<svg width="1200" height="380" viewBox="0 0 1200 380" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1115"/>
      <stop offset="100%" stop-color="#07080a"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1c1f26" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#14161c" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="cardGradActive" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1f2a2e" stop-opacity="0.98"/>
      <stop offset="100%" stop-color="#161e22" stop-opacity="0.98"/>
    </linearGradient>
    <linearGradient id="progressFill" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="edgeGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <marker id="arrowCyan" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L0,8 L7,4 z" fill="#22d3ee"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="380" rx="16" fill="url(#bgGrad)"/>

  <!-- Subtle grid (React Flow background dots) -->
  <g opacity="0.18">
    <circle cx="40" cy="40" r="0.9" fill="#3a3f4a"/>
    <circle cx="80" cy="40" r="0.9" fill="#3a3f4a"/>
    <circle cx="120" cy="40" r="0.9" fill="#3a3f4a"/>
    <circle cx="160" cy="40" r="0.9" fill="#3a3f4a"/>
    <circle cx="200" cy="40" r="0.9" fill="#3a3f4a"/>
    <circle cx="240" cy="40" r="0.9" fill="#3a3f4a"/>
    <circle cx="280" cy="40" r="0.9" fill="#3a3f4a"/>
    <circle cx="40" cy="80" r="0.9" fill="#3a3f4a"/>
    <circle cx="80" cy="80" r="0.9" fill="#3a3f4a"/>
    <circle cx="120" cy="80" r="0.9" fill="#3a3f4a"/>
    <circle cx="160" cy="80" r="0.9" fill="#3a3f4a"/>
    <circle cx="200" cy="80" r="0.9" fill="#3a3f4a"/>
    <circle cx="240" cy="80" r="0.9" fill="#3a3f4a"/>
    <circle cx="280" cy="80" r="0.9" fill="#3a3f4a"/>
    <circle cx="40" cy="120" r="0.9" fill="#3a3f4a"/>
    <circle cx="80" cy="120" r="0.9" fill="#3a3f4a"/>
    <circle cx="120" cy="120" r="0.9" fill="#3a3f4a"/>
    <circle cx="160" cy="120" r="0.9" fill="#3a3f4a"/>
    <circle cx="200" cy="120" r="0.9" fill="#3a3f4a"/>
    <circle cx="240" cy="120" r="0.9" fill="#3a3f4a"/>
    <circle cx="280" cy="120" r="0.9" fill="#3a3f4a"/>
    <circle cx="40" cy="160" r="0.9" fill="#3a3f4a"/>
    <circle cx="80" cy="160" r="0.9" fill="#3a3f4a"/>
    <circle cx="120" cy="160" r="0.9" fill="#3a3f4a"/>
    <circle cx="160" cy="160" r="0.9" fill="#3a3f4a"/>
    <circle cx="200" cy="160" r="0.9" fill="#3a3f4a"/>
    <circle cx="240" cy="160" r="0.9" fill="#3a3f4a"/>
    <circle cx="280" cy="160" r="0.9" fill="#3a3f4a"/>
    <circle cx="40" cy="200" r="0.9" fill="#3a3f4a"/>
    <circle cx="80" cy="200" r="0.9" fill="#3a3f4a"/>
    <circle cx="120" cy="200" r="0.9" fill="#3a3f4a"/>
    <circle cx="160" cy="200" r="0.9" fill="#3a3f4a"/>
    <circle cx="200" cy="200" r="0.9" fill="#3a3f4a"/>
    <circle cx="240" cy="200" r="0.9" fill="#3a3f4a"/>
    <circle cx="280" cy="200" r="0.9" fill="#3a3f4a"/>
    <circle cx="40" cy="240" r="0.9" fill="#3a3f4a"/>
    <circle cx="80" cy="240" r="0.9" fill="#3a3f4a"/>
    <circle cx="120" cy="240" r="0.9" fill="#3a3f4a"/>
    <circle cx="160" cy="240" r="0.9" fill="#3a3f4a"/>
    <circle cx="200" cy="240" r="0.9" fill="#3a3f4a"/>
    <circle cx="240" cy="240" r="0.9" fill="#3a3f4a"/>
    <circle cx="280" cy="240" r="0.9" fill="#3a3f4a"/>
    <circle cx="40" cy="280" r="0.9" fill="#3a3f4a"/>
    <circle cx="80" cy="280" r="0.9" fill="#3a3f4a"/>
    <circle cx="120" cy="280" r="0.9" fill="#3a3f4a"/>
    <circle cx="160" cy="280" r="0.9" fill="#3a3f4a"/>
    <circle cx="200" cy="280" r="0.9" fill="#3a3f4a"/>
    <circle cx="240" cy="280" r="0.9" fill="#3a3f4a"/>
    <circle cx="280" cy="280" r="0.9" fill="#3a3f4a"/>
    <circle cx="40" cy="320" r="0.9" fill="#3a3f4a"/>
    <circle cx="80" cy="320" r="0.9" fill="#3a3f4a"/>
    <circle cx="120" cy="320" r="0.9" fill="#3a3f4a"/>
    <circle cx="160" cy="320" r="0.9" fill="#3a3f4a"/>
    <circle cx="200" cy="320" r="0.9" fill="#3a3f4a"/>
    <circle cx="240" cy="320" r="0.9" fill="#3a3f4a"/>
    <circle cx="280" cy="320" r="0.9" fill="#3a3f4a"/>
  </g>

  <!-- Bottom gold accent (portfolio consistency) -->
  <path d="M0 370 L1200 370 L1200 380 L0 380 Z" fill="#D4AF37"/>

  <!-- ============== EDGES (curved, behind nodes) ============== -->
  <!-- Root → child top -->
  <path d="M260 165 C 320 165, 320 95, 380 95"
        stroke="#22d3ee" stroke-width="1.6" fill="none" opacity="0.85"
        filter="url(#edgeGlow)" marker-end="url(#arrowCyan)"/>
  <!-- Root → child bottom -->
  <path d="M260 195 C 320 195, 320 265, 380 265"
        stroke="#22d3ee" stroke-width="1.6" fill="none" opacity="0.85"
        filter="url(#edgeGlow)" marker-end="url(#arrowCyan)"/>
  <!-- Child top → sink -->
  <path d="M540 95 C 600 95, 600 165, 660 165"
        stroke="#3a3f4a" stroke-width="1.4" fill="none" opacity="0.7"
        marker-end="url(#arrowCyan)"/>
  <!-- Child bottom → sink -->
  <path d="M540 265 C 600 265, 600 195, 660 195"
        stroke="#3a3f4a" stroke-width="1.4" fill="none" opacity="0.7"
        marker-end="url(#arrowCyan)"/>

  <!-- ============== NODE 1 — root (DONE) ============== -->
  <g transform="translate(100, 130)">
    <!-- shadow -->
    <rect x="2" y="6" width="160" height="100" rx="14" fill="#000" opacity="0.35" filter="url(#cardShadow)"/>
    <!-- card -->
    <rect width="160" height="100" rx="14" fill="url(#cardGrad)" stroke="#2a2f3a" stroke-width="1"/>
    <!-- left handle -->
    <circle cx="0" cy="50" r="3.5" fill="#0f1115" stroke="#22d3ee" stroke-width="1"/>
    <!-- right handle -->
    <circle cx="160" cy="50" r="3.5" fill="#0f1115" stroke="#22d3ee" stroke-width="1"/>
    <!-- severity dot -->
    <circle cx="148" cy="12" r="3" fill="#94a3b8"/>
    <!-- code -->
    <text x="14" y="26" font-family="JetBrains Mono, ui-monospace, monospace" font-size="11" fill="#22d3ee" font-weight="700">CTX-MONGO</text>
    <!-- status pill -->
    <rect x="86" y="14" width="48" height="16" rx="8" fill="#22c55e" fill-opacity="0.14" stroke="#22c55e" stroke-opacity="0.3"/>
    <text x="110" y="25" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#22c55e" font-weight="600">DONE</text>
    <!-- label -->
    <text x="14" y="55" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#e8eaee" font-weight="700">Shared Mongo</text>
    <text x="14" y="71" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#e8eaee" font-weight="700">Client</text>
    <!-- lane chip -->
    <rect x="14" y="80" width="58" height="14" rx="7" fill="#3a3f4a" fill-opacity="0.3" stroke="#3a3f4a" stroke-opacity="0.5"/>
    <text x="43" y="90" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#94a3b8">core</text>
  </g>

  <!-- ============== NODE 2 — top (IN PROGRESS, current) ============== -->
  <g transform="translate(380, 60)">
    <rect x="2" y="6" width="160" height="100" rx="14" fill="#000" opacity="0.4" filter="url(#cardShadow)"/>
    <rect width="160" height="100" rx="14" fill="url(#cardGradActive)" stroke="#22d3ee" stroke-width="1.5"/>
    <!-- outer ring (current task) -->
    <rect x="-2" y="-2" width="164" height="104" rx="16" fill="none" stroke="#22d3ee" stroke-opacity="0.25" stroke-width="2"/>
    <circle cx="0" cy="50" r="3.5" fill="#0f1115" stroke="#22d3ee" stroke-width="1"/>
    <circle cx="160" cy="50" r="3.5" fill="#0f1115" stroke="#22d3ee" stroke-width="1"/>
    <circle cx="148" cy="12" r="3" fill="#f97316"/>
    <text x="14" y="26" font-family="JetBrains Mono, ui-monospace, monospace" font-size="11" fill="#22d3ee" font-weight="700">CTX-PERT</text>
    <rect x="78" y="14" width="56" height="16" rx="8" fill="#3b82f6" fill-opacity="0.16" stroke="#3b82f6" stroke-opacity="0.35"/>
    <text x="106" y="25" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#60a5fa" font-weight="600">IN PROGRESS</text>
    <text x="14" y="55" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#e8eaee" font-weight="700">PERT Graph</text>
    <text x="14" y="71" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#e8eaee" font-weight="700">React Flow</text>
    <rect x="14" y="80" width="68" height="14" rx="7" fill="#3a3f4a" fill-opacity="0.3" stroke="#3a3f4a" stroke-opacity="0.5"/>
    <text x="48" y="90" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#94a3b8">webview</text>
  </g>

  <!-- ============== NODE 3 — bottom (PENDING) ============== -->
  <g transform="translate(380, 230)">
    <rect x="2" y="6" width="160" height="100" rx="14" fill="#000" opacity="0.35" filter="url(#cardShadow)"/>
    <rect width="160" height="100" rx="14" fill="url(#cardGrad)" stroke="#2a2f3a" stroke-width="1"/>
    <circle cx="0" cy="50" r="3.5" fill="#0f1115" stroke="#22d3ee" stroke-width="1"/>
    <circle cx="160" cy="50" r="3.5" fill="#0f1115" stroke="#22d3ee" stroke-width="1"/>
    <circle cx="148" cy="12" r="3" fill="#eab308"/>
    <text x="14" y="26" font-family="JetBrains Mono, ui-monospace, monospace" font-size="11" fill="#22d3ee" font-weight="700">CTX-NOTES</text>
    <rect x="92" y="14" width="42" height="16" rx="8" fill="#94a3b8" fill-opacity="0.14" stroke="#94a3b8" stroke-opacity="0.3"/>
    <text x="113" y="25" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#cbd5e1" font-weight="600">PENDING</text>
    <text x="14" y="55" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#e8eaee" font-weight="700">Notes Panel</text>
    <text x="14" y="71" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#e8eaee" font-weight="700">CRUD + Search</text>
    <rect x="14" y="80" width="58" height="14" rx="7" fill="#3a3f4a" fill-opacity="0.3" stroke="#3a3f4a" stroke-opacity="0.5"/>
    <text x="43" y="90" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#94a3b8">notes</text>
  </g>

  <!-- ============== NODE 4 — sink (BLOCKED) ============== -->
  <g transform="translate(660, 130)">
    <rect x="2" y="6" width="160" height="100" rx="14" fill="#000" opacity="0.35" filter="url(#cardShadow)"/>
    <rect width="160" height="100" rx="14" fill="url(#cardGrad)" stroke="#2a2f3a" stroke-width="1"/>
    <circle cx="0" cy="50" r="3.5" fill="#0f1115" stroke="#22d3ee" stroke-width="1"/>
    <circle cx="160" cy="50" r="3.5" fill="#0f1115" stroke="#22d3ee" stroke-width="1"/>
    <circle cx="148" cy="12" r="3" fill="#ef4444"/>
    <text x="14" y="26" font-family="JetBrains Mono, ui-monospace, monospace" font-size="11" fill="#22d3ee" font-weight="700">CTX-WV</text>
    <rect x="86" y="14" width="48" height="16" rx="8" fill="#a855f7" fill-opacity="0.14" stroke="#a855f7" stroke-opacity="0.3"/>
    <text x="110" y="25" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#c084fc" font-weight="600">BLOCKED</text>
