    <text x="14" y="71" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#e8eaee" font-weight="700">+ Bundle</text>
    <rect x="14" y="80" width="62" height="14" rx="7" fill="#3a3f4a" fill-opacity="0.3" stroke="#3a3f4a" stroke-opacity="0.5"/>
    <text x="45" y="90" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#94a3b8">esbuild</text>
  </g>

  <!-- ============== Title block (right) ============== -->
  <g transform="translate(880, 100)">
    <text x="0" y="0" font-family="JetBrains Mono, ui-monospace, monospace" font-size="58" fill="#F0FFFF" font-weight="700" letter-spacing="3">CORTEX</text>
    <line x1="0" y1="18" x2="240" y2="18" stroke="#22d3ee" stroke-width="1" opacity="0.6"/>
    <text x="0" y="48" font-family="JetBrains Mono, ui-monospace, monospace" font-size="14" fill="#22d3ee" letter-spacing="1">/// VS CODE EXTENSION</text>

    <!-- Mini progress bar (HUD ring style) -->
    <text x="0" y="100" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#cbd5e1">PERT navigator for</text>
    <text x="0" y="120" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#cbd5e1">dependent tasks, notes &amp; logs</text>

    <!-- Progress bar -->
    <g transform="translate(0, 150)">
      <rect width="240" height="4" rx="2" fill="#2a2f3a"/>
      <rect width="172" height="4" rx="2" fill="url(#progressFill)" opacity="0.95"/>
      <text x="0" y="22" font-family="JetBrains Mono, ui-monospace, monospace" font-size="10" fill="#94a3b8">PROGRESS</text>
      <text x="240" y="22" text-anchor="end" font-family="JetBrains Mono, ui-monospace, monospace" font-size="10" fill="#22d3ee" font-weight="600">71% · 17/24</text>
    </g>

    <!-- Stack badge line -->
    <text x="0" y="208" font-family="JetBrains Mono, ui-monospace, monospace" font-size="11" fill="#6b7280">TypeScript · MongoDB · React Flow · esbuild</text>
  </g>

  <!-- Status bar at bottom (mimics the extension status bar) -->
  <g transform="translate(0, 348)" opacity="0.85">
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#2a2f3a" stroke-width="0.5"/>
    <circle cx="20" cy="11" r="3.5" fill="#22c55e"/>
    <text x="32" y="15" font-family="JetBrains Mono, ui-monospace, monospace" font-size="9" fill="#94a3b8">mongo://localhost · cortex</text>
    <text x="380" y="15" font-family="JetBrains Mono, ui-monospace, monospace" font-size="9" fill="#6b7280">|</text>
    <text x="394" y="15" font-family="JetBrains Mono, ui-monospace, monospace" font-size="9" fill="#94a3b8">3 plans · 24 tasks · 12 notes</text>
    <text x="1180" y="15" text-anchor="end" font-family="JetBrains Mono, ui-monospace, monospace" font-size="9" fill="#22d3ee">Ctrl+Alt+N</text>
  </g>
